<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: transparent; padding: 8px; }
#video { width: 100%; border-radius: 12px; display: block; background: #1e2130; min-height: 200px; }
.btn {
  display: block; width: 100%; margin-top: 8px; padding: 13px;
  font-size: 15px; font-weight: 600; border: none; border-radius: 10px;
  cursor: pointer; transition: opacity .15s;
}
.btn:active { opacity: .75; }
.btn-capture { background: #2563EB; color: #fff; }
.btn-retry   { background: #374151; color: #fff; display: none; }
#preview { width: 100%; border-radius: 12px; margin-top: 6px; display: none; }
#status  { margin-top: 8px; font-size: 12px; color: #64748b; text-align: center; min-height: 18px; }
canvas   { display: none; }
</style>
</head>
<body>
<video id="video" autoplay playsinline muted></video>
<button class="btn btn-capture" id="btnCapture" onclick="capture()">📷 Capturar QR</button>
<button class="btn btn-retry"   id="btnRetry"   onclick="retake()">🔄 Volver a intentar</button>
<img    id="preview" alt="Captura">
<canvas id="canvas"></canvas>
<div    id="status">Iniciando cámara trasera…</div>

<script>
/* ── Minimal Streamlit component bridge ── */
const Streamlit = {
  RENDER_EVENT: "streamlit:render",
  _handlers: {},
  events: {
    addEventListener(ev, fn) {
      (Streamlit._handlers[ev] = Streamlit._handlers[ev] || []).push(fn);
    }
  },
  setComponentReady() {
    window.parent.postMessage({ type: "streamlit:componentReady", apiVersion: 1 }, "*");
  },
  setComponentValue(value) {
    window.parent.postMessage({ type: "streamlit:setComponentValue", value }, "*");
  },
  setFrameHeight(height) {
    window.parent.postMessage({ type: "streamlit:setFrameHeight", height }, "*");
  }
};
window.addEventListener("message", function(e) {
  if (e.data && e.data.type === "streamlit:render") {
    (Streamlit._handlers[Streamlit.RENDER_EVENT] || []).forEach(fn => fn(e.data));
  }
});
/* ── Camera logic ── */
const video   = document.getElementById('video');
const canvas  = document.getElementById('canvas');
const preview = document.getElementById('preview');
const btnC    = document.getElementById('btnCapture');
const btnR    = document.getElementById('btnRetry');
const status  = document.getElementById('status');
let stream = null;

function resize() {
  Streamlit.setFrameHeight(document.body.scrollHeight + 20);
}

function startCamera() {
  const constraints = {
    video: {
      facingMode: { ideal: 'environment' },
      width:  { ideal: 1280 },
      height: { ideal: 720 }
    }
  };
  navigator.mediaDevices.getUserMedia(constraints)
    .then(s => {
      stream = s;
      video.srcObject = s;
      video.style.display = 'block';
      btnC.style.display  = 'block';
      status.textContent  = '✅ Cámara trasera activa — apunta al QR y captura';
      resize();
    })
    .catch(err => {
      status.textContent = '❌ ' + err.message + ' — verifica permisos de cámara';
      resize();
    });
}

function capture() {
  if (!stream) return;
  canvas.width  = video.videoWidth  || 640;
  canvas.height = video.videoHeight || 480;
  canvas.getContext('2d').drawImage(video, 0, 0);
  const dataURL = canvas.toDataURL('image/jpeg', 0.92);
  video.style.display   = 'none';
  btnC.style.display    = 'none';
  btnR.style.display    = 'block';
  preview.src           = dataURL;
  preview.style.display = 'block';
  status.textContent    = '📤 Procesando imagen…';
  Streamlit.setComponentValue(dataURL);
  resize();
}

function retake() {
  preview.style.display = 'none';
  btnR.style.display    = 'none';
  video.style.display   = 'block';
  btnC.style.display    = 'block';
  status.textContent    = '✅ Cámara trasera activa — apunta al QR y captura';
  Streamlit.setComponentValue(null);
  resize();
}

Streamlit.events.addEventListener(Streamlit.RENDER_EVENT, function() {
  if (!stream) startCamera();
  resize();
});

Streamlit.setComponentReady();
</script>
</body>
</html>
